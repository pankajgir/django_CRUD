jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/django_CRUD

            git pull origin main

            sudo docker stop crud-container || true
            sudo docker rm crud-container || true

            sudo docker build -t crud-app .

            sudo docker run -d -p 8000:8000 --name crud-container crud-app